[tool.ruff]
extend-exclude = ["venv"]

[tool.ruff.lint]
# Correctness-focused: pyflakes + pycodestyle errors. Style nits are not
# worth churn in a small-business tool.
select = ["E4", "E7", "E9", "F"]

[tool.pytest.ini_options]
# Only collect from tests/ — the repo root and scripts/ hold manual dev tools
# (some hit live APIs) that must never run under `pytest` / `make unit`.
testpaths = ["tests"]
# Bare `pytest` (CI) must find the event_sync package: the root-level test
# files whose collection used to put the repo root on sys.path are gone.
pythonpath = ["."]
