name: Sync Events from Notion to Wix

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'  # 14:00 UTC = 9 AM EST (winter) / 10 AM EDT (summer)
  # Notion automations/buttons can fire this via a webhook to
  # https://api.github.com/repos/{owner}/{repo}/dispatches with
  # body {"event_type": "notion-sync"}. See docs/NOTION_BACKEND.md.
  repository_dispatch:
    types: [notion-sync]

# Never run two syncs at once: overlapping runs each snapshot the Wix event
# index at start, so both would see the same Ready row as unmatched and
# double-create it. Queue instead of cancel — a mid-flight sync must finish.
concurrency:
  group: wix-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-events:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # `sync` starts with an enrich pass, so one step covers both.
      - name: Enrich + sync events from Notion to Wix
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_ACCOUNT_ID: ${{ secrets.WIX_ACCOUNT_ID }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
          # Production guard: with this secret set, the run refuses to touch
          # the production site unless the command below explicitly adds
          # --production. To transition CI to production on purpose: set the
          # WIX_SITE_ID secret to the prod id AND change the run line to
          # `python sync_events.py sync --production`.
          WIX_PROD_SITE_ID: ${{ secrets.WIX_PROD_SITE_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          NOTION_ACCESS_TOKEN: ${{ secrets.NOTION_ACCESS_TOKEN }}
          NOTION_EVENT_SCHEDULING_DB_ID: ${{ secrets.NOTION_EVENT_SCHEDULING_DB_ID }}
          NOTION_CATALOG_DB_ID: ${{ secrets.NOTION_CATALOG_DB_ID }}
          # Legacy secret names; remove once the new *_DB_ID secrets are set.
          NOTION_EVENTS_DB_ID: ${{ secrets.NOTION_EVENTS_DB_ID }}
          NOTION_CLASSES_DB_ID: ${{ secrets.NOTION_CLASSES_DB_ID }}
          NOTION_SETTINGS_DB_ID: ${{ secrets.NOTION_SETTINGS_DB_ID }}
          NOTION_SITE_CONFIG_DB_ID: ${{ secrets.NOTION_SITE_CONFIG_DB_ID }}
        run: python sync_events.py sync

      - name: Report status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Event sync completed successfully"
          else
            echo "❌ Event sync failed - check logs above"
            exit 1
          fi
